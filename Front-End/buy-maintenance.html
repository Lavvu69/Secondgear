<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Page Maintenance - SecondGear</title>
    <link rel="stylesheet" href="Home.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 10% 10%, rgba(29, 78, 216, 0.1), transparent 30%),
                radial-gradient(circle at 88% 12%, rgba(14, 165, 233, 0.12), transparent 34%),
                linear-gradient(180deg, #eff4ff 0%, #e7edf8 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #0f172a;
        }

        .maintenance-wrap {
            width: min(860px, 94vw);
            margin: 36px auto;
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid #dbe5f3;
            border-radius: 18px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.14);
            padding: 30px 24px;
            text-align: center;
        }

        .maintenance-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: #dbeafe;
            color: #1e3a8a;
            border: 1px solid #bfdbfe;
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
        }

        p {
            margin: 0;
            color: #475569;
            line-height: 1.6;
            font-size: 1rem;
        }

        .maintenance-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .maintenance-actions a,
        .maintenance-actions button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        .maintenance-actions a {
            background: linear-gradient(90deg, #1d4ed8, #0ea5e9);
            color: #fff;
        }

        .maintenance-actions button {
            background: #e2e8f0;
            color: #0f172a;
        }
    </style>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="Logo-text.png" alt="SecondGear" class="logo-text">
            <img src="Logo-gear.png" alt="Gear" class="logo-gear">
            <span class="brand-name">SecondGear</span>
        </div>
        <nav>
            <a href="/">Home</a>
            <a href="/buy" class="active">Buy</a>
            <a href="/sell">Sell</a>
            <a href="service-booking.html">Service</a>
        </nav>
    </header>

    <main class="maintenance-wrap">
        <div class="maintenance-badge">Temporarily Unavailable</div>
        <h1>Buy Page Is Under Maintenance</h1>
        <p>
            The buy section is currently in admin mode and temporarily unavailable for users.
            Please try again shortly.
        </p>
        <div class="maintenance-actions">
            <a href="/">Go to Home</a>
            <button type="button" onclick="window.location.reload()">Retry</button>
        </div>
    </main>
    <script src="nav-mobile.js" defer></script>
</body>
</html>
