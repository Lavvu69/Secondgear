<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Feedback - SecondGear</title>
    <link rel="stylesheet" href="floating-navbar.css">
    <link rel="stylesheet" href="feedback.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <header class="floating-navbar">
        <div class="logo">
            <img src="Logo-text.png" alt="SecondGear" class="logo-text">
            <img src="Logo-gear.png" alt="Gear" class="logo-gear">
            <span class="brand-name">SecondGear</span>
        </div>
        <nav>
            <a href="/">Home</a>
            <a href="/buy">Buy</a>
            <a href="/sell">Sell</a>
            <a href="service-booking.html">Service</a>
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="/feedback.html">Feedback</a>
            <a href="admin-bookings.html" id="bookingsTab">Bookings</a>
            <button id="admin-logout-btn" style="float:right; margin-left:20px; background:#b1422e; color:#fff; border:none; border-radius:6px; padding:6px 14px; font-weight:600; box-shadow:0 2px 6px rgba(231,76,60,0.08); cursor:pointer; transition:background 0.2s;">Logout (Admin)</button>
        </nav>
    </header>

    <main>
        <h1>User Feedback</h1>
        <table id="feedback-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User Email</th>
                    <th>Feedback</th>
                    <th>Date</th>
                    <th>Show on Homepage</th>
                </tr>
            </thead>
            <tbody>
                <!-- Feedback rows will be loaded here -->
            </tbody>
        </table>
    </main>
    <script src="admin-auth.js"></script>
    <script src="feedback.js"></script>
</body>
</html>
